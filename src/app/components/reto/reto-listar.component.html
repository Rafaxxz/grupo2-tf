<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Retos</h1>
      <p class="page-sub">Desafíos activos del sistema</p>
    </div>
    <a routerLink="/retos/nuevo" class="btn-nuevo">+ Nuevo Reto</a>
  </div>

  <div class="retos-grid">
    @for (r of retos; track r.idReto) {
      <div class="reto-card" [class.inactivo]="!r.activo">
        <div class="reto-header">
          <span class="reto-tipo">{{ r.tipo }}</span>
          <span class="reto-activo">{{ r.activo ? '🟢 Activo' : '⚫ Inactivo' }}</span>
        </div>
        <h3 class="reto-titulo">{{ r.titulo }}</h3>
        <p class="reto-desc">{{ r.descripcion }}</p>
        <div class="reto-meta">
          <span class="reto-dif" [style.color]="difColor(r.dificultad || '')">{{ r.dificultad }}</span>
          <span class="reto-dur">⏱ {{ r.duracionDias }} días</span>
        </div>
        <div class="reto-actions">
          <a [routerLink]="['/retos/editar', r.idReto]" class="btn-edit"><mat-icon>edit</mat-icon></a>
          <button (click)="eliminar(r.idReto!)" class="btn-del"><mat-icon>delete</mat-icon></button>
        </div>
      </div>
    }
    @empty { <p class="empty">No hay retos registrados.</p> }
  </div>
</div>
