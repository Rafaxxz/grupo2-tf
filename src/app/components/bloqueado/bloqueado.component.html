<div class="block-screen">
  <div class="block-card">
    <div class="lock-icon">🔒</div>
    <h1>Acceso Bloqueado</h1>
    <p class="block-msg">
      Tu cuenta ha sido bloqueada por control parental.
      @if (limite) {
        Límite configurado: <strong>{{ limite.minutosMaximos }} minutos ({{ limite.tipo }})</strong>.
      }
    </p>
    <p class="block-sub">Habla con tu padre o madre para que reactiven el acceso.</p>
    <button class="btn-salir" (click)="cerrarSesion()">Cerrar sesión</button>
  </div>
</div>
