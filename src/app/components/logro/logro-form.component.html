<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ (editando ? 'logros.formEdit' : 'logros.formNew') | t }}</h1>
      <p class="page-sub">{{ (editando ? 'logros.formEditSub' : 'logros.formNewSub') | t }}</p>
    </div>
    <a routerLink="/logros" class="btn-back"><mat-icon>arrow_back</mat-icon> {{ 'common.back' | t }}</a>
  </div>

  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>{{ 'logros.fName' | t }} *</label>
        <input [(ngModel)]="logro.nombre" name="nombre" />
      </div>
      <div class="form-group">
        <label>{{ 'logros.fIcon' | t }}</label>
        <input [(ngModel)]="logro.iconoUrl" name="icono" placeholder="https://..." />
      </div>
    </div>
    <div class="form-group">
      <label>{{ 'logros.fDesc' | t }}</label>
      <textarea [(ngModel)]="logro.descripcion" name="desc" [placeholder]="'logros.fDescPh' | t" rows="3"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>{{ 'logros.fCriterio' | t }} *</label>
        <input [(ngModel)]="logro.criterio" name="criterio" [placeholder]="'logros.fCriterioPh' | t" />
      </div>
      <div class="form-group">
        <label>{{ 'logros.fValor' | t }} *</label>
        <input type="number" [(ngModel)]="logro.valorCriterio" name="valor" min="1" />
      </div>
      <div class="form-group">
        <label>{{ 'logros.fPuntos' | t }}</label>
        <input type="number" [(ngModel)]="logro.puntosOtorgados" name="puntos" min="0" />
      </div>
    </div>
    <button class="btn-guardar" (click)="guardar()">
      <mat-icon>save</mat-icon> {{ (editando ? 'common.saveChanges' : 'logros.create') | t }}
    </button>
  </div>
</div>
