<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ editando ? 'Editar' : 'Nuevo' }} Logro</h1>
      <p class="page-sub">{{ editando ? 'Modifica los datos del logro' : 'Registra un nuevo achievement' }}</p>
    </div>
    <a routerLink="/logros" class="btn-back"><mat-icon>arrow_back</mat-icon> Volver</a>
  </div>

  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre *</label>
        <input [(ngModel)]="logro.nombre" placeholder="Nombre del logro" />
      </div>
      <div class="form-group">
        <label>Ícono (emoji)</label>
        <input [(ngModel)]="logro.iconoUrl" placeholder="🏆" />
      </div>
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea [(ngModel)]="logro.descripcion" placeholder="Describe cómo se obtiene este logro" rows="3"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Criterio *</label>
        <input [(ngModel)]="logro.criterio" placeholder="ej: sesiones, horas_juego, retos" />
      </div>
      <div class="form-group">
        <label>Valor criterio *</label>
        <input type="number" [(ngModel)]="logro.valorCriterio" min="1" />
      </div>
      <div class="form-group">
        <label>Puntos otorgados</label>
        <input type="number" [(ngModel)]="logro.puntosOtorgados" min="0" />
      </div>
    </div>
    <button class="btn-guardar" (click)="guardar()">
      <mat-icon>save</mat-icon> {{ editando ? 'Guardar cambios' : 'Crear Logro' }}
    </button>
  </div>
</div>
