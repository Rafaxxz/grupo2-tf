<div class="login-page">
  <div class="login-center">

    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <h1>PlayControl</h1>
      <p>PANEL FAMILIAR</p>
    </div>

    <div class="login-card">
      <h2>Iniciar Sesión</h2>
      <p class="sub">Ingresa tus credenciales para acceder al sistema.</p>

      <div class="field">
        <label>USUARIO</label>
        <div class="input-wrap">
          <span class="icon">@</span>
          <input type="text" [(ngModel)]="username" placeholder="usuario" />
        </div>
      </div>

      <div class="field">
        <label>CONTRASEÑA</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" [(ngModel)]="password" placeholder="••••••••" (keydown.enter)="login()" />
        </div>
      </div>

      @if (error) { <div class="error">{{ error }}</div> }

      <button class="btn-login" (click)="login()" [disabled]="loading">
        {{ loading ? 'Conectando...' : 'Ingresar →' }}
      </button>

      <div class="divider"><span>o continúa con</span></div>

      <div class="oauth-btns">
        <!-- Google renderiza su propio botón aquí vía GIS renderButton() -->
        <div id="google-btn-container" class="google-btn-wrapper"></div>

        <button class="btn-oauth btn-facebook" (click)="loginFacebook()" [disabled]="loading">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Continuar con Facebook
        </button>
      </div>
    </div>

    <div class="badges">
      <div class="badge">🔒 Cifrado</div>
      <div class="badge">🛡️ Seguro</div>
      <div class="badge">👨‍👩‍👧 Familiar</div>
    </div>

  </div>
</div>
