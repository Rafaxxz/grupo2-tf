<div class="login-page">
  <div class="login-center">

    <div class="brand">
      <div class="brand-icon"><mat-icon>shield</mat-icon></div>
      <h1>PlayControl</h1>
      <p>{{ 'registro.brandSub' | t }}</p>
    </div>

    <div class="login-card">
      <h2>{{ 'registro.title' | t }}</h2>
      <p class="sub">{{ 'registro.subtitle' | t }}</p>

      <div class="field">
        <label>{{ 'registro.usernameLabel' | t }}</label>
        <div class="input-wrap">
          <span class="icon"><mat-icon>alternate_email</mat-icon></span>
          <input type="text" [(ngModel)]="username" [placeholder]="'registro.usernamePh' | t" />
        </div>
      </div>

      <div class="field">
        <label>{{ 'registro.nombreLabel' | t }}</label>
        <div class="input-wrap">
          <span class="icon"><mat-icon>person</mat-icon></span>
          <input type="text" [(ngModel)]="nombre" [placeholder]="'registro.nombrePh' | t" />
        </div>
      </div>

      <div class="field">
        <label>{{ 'registro.emailLabel' | t }}</label>
        <div class="input-wrap">
          <span class="icon"><mat-icon>email</mat-icon></span>
          <input type="email" [(ngModel)]="email" [placeholder]="'registro.emailPh' | t" />
        </div>
      </div>

      <div class="field">
        <label>{{ 'registro.rolLabel' | t }}</label>
        <div class="input-wrap">
          <span class="icon"><mat-icon>badge</mat-icon></span>
          <select [(ngModel)]="rolId">
            <option [value]="null">{{ 'registro.rolPh' | t }}</option>
            @for (r of roles; track r.idRol) {
              <option [value]="r.idRol">{{ r.nombre }}</option>
            }
          </select>
        </div>
      </div>

      <div class="field">
        <label>{{ 'registro.passLabel' | t }}</label>
        <div class="input-wrap">
          <span class="icon"><mat-icon>lock</mat-icon></span>
          <input type="password" [(ngModel)]="password" [placeholder]="'registro.passPh' | t" />
        </div>
      </div>

      <div class="field">
        <label>{{ 'registro.confirmLabel' | t }}</label>
        <div class="input-wrap">
          <span class="icon"><mat-icon>lock_reset</mat-icon></span>
          <input type="password" [(ngModel)]="confirmPassword" [placeholder]="'registro.confirmPh' | t" (keydown.enter)="registrar()" />
        </div>
      </div>

      @if (error) { <div class="error">{{ error }}</div> }

      <button class="btn-login" (click)="registrar()" [disabled]="guardando">
        @if (guardando) { {{ 'registro.saving' | t }} }
        @else { {{ 'registro.submit' | t }} <mat-icon>person_add</mat-icon> }
      </button>

      <p class="link-login">
        {{ 'registro.alreadyHave' | t }}
        <a routerLink="/login">{{ 'registro.goLogin' | t }}</a>
      </p>
    </div>

  </div>
</div>
