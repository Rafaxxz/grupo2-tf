<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ 'canjes.formNew' | t }}</h1>
      <p class="page-sub">{{ 'canjes.subtitle' | t }}</p>
    </div>
    <a routerLink="/canjes" class="btn-back"><mat-icon>arrow_back</mat-icon> {{ 'common.back' | t }}</a>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label>{{ 'canjes.usuario' | t }} *</label>
      <select [(ngModel)]="canje.usuarioId" name="usuario">
        <option [ngValue]="0" disabled>—</option>
        @for (u of usuarios; track u.idUsuario) {
          <option [ngValue]="u.idUsuario">{{ u.nombre }} ({{ u.puntosTotales || 0 }} pts)</option>
        }
      </select>
    </div>
    <div class="form-group">
      <label>{{ 'canjes.recompensa' | t }} *</label>
      <select [(ngModel)]="canje.recompensaId" name="recompensa">
        <option [ngValue]="0" disabled>—</option>
        @for (r of recompensas; track r.idRecompensa) {
          <option [ngValue]="r.idRecompensa">{{ r.nombre }} ({{ r.costoPuntos }} pts)</option>
        }
      </select>
    </div>
    <button type="button" class="btn-guardar" (click)="guardar()">
      <mat-icon>redeem</mat-icon> {{ 'common.create' | t }}
    </button>
  </div>
</div>
