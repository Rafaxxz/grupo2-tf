<div class="container">

    <mat-toolbar class="custom-toolbar">

        <button 
        matButton 
        class="btn-rojo" 
        aria-label="Example icon-button with menu icon"
        [matMenuTriggerFor]="menuSalas">
        <mat-icon aria-hidden="false" aria-label="Example home icon" fontIcon="home"></mat-icon>
        Salas
    </button>
    </mat-toolbar>

    <mat-menu #menuSalas="matMenu">
        <button mat-menu-item routerLink="/salas/nuevo"><mat-icon>add</mat-icon>Registrar</button>
        <button mat-menu-item routerLink="/salas/listas"><mat-icon>list</mat-icon>Lista</button>
    </mat-menu>

</div>
