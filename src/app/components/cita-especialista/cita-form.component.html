<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ (editando ? 'citas.formEdit' : 'citas.formNew') | t }}</h1>
      <p class="page-sub">{{ (editando ? 'citas.formEditSub' : 'citas.formNewSub') | t }}</p>
    </div>
    <a routerLink="/citas" class="btn-back"><mat-icon>arrow_back</mat-icon> {{ 'common.back' | t }}</a>
  </div>
  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>{{ 'citas.fUser' | t }} *</label>
        <select [(ngModel)]="cita.usuarioId" name="usuario">
          <option [value]="0">{{ 'citas.fUserPh' | t }}</option>
          @for (u of usuarios; track u.idUsuario) {
            <option [value]="u.idUsuario">{{ u.nombre }} ({{ u.username }})</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>{{ 'citas.fSpecialist' | t }} *</label>
        <select [(ngModel)]="cita.especialistaId" name="especialista">
          <option [value]="0">{{ 'citas.fSpecialistPh' | t }}</option>
          @for (e of especialistas; track e.idEspecialista) {
            <option [value]="e.idEspecialista">{{ nombreEsp(e) }} – {{ e.especialidad }}</option>
          }
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>{{ 'citas.fDate' | t }} *</label>
        <input type="datetime-local" [(ngModel)]="cita.fechaHora" name="fecha" />
      </div>
      <div class="form-group">
        <label>{{ 'citas.fState' | t }}</label>
        <select [(ngModel)]="cita.estado" name="estado">
          @for (e of estados; track e) { <option [value]="e">{{ e }}</option> }
        </select>
      </div>
    </div>
    @if (error) { <div class="form-error">{{ error }}</div> }

    <button class="btn-guardar" (click)="guardar()" [disabled]="guardando">
      <mat-icon>save</mat-icon>
      {{ guardando ? ('login.connecting' | t) : ((editando ? 'common.saveChanges' : 'citas.book') | t) }}
    </button>
  </div>
</div>
