<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ 'retosUsuario.formNew' | t }}</h1>
      <p class="page-sub">{{ 'retosUsuario.subtitle' | t }}</p>
    </div>
    <a routerLink="/retos-usuario" class="btn-back"><mat-icon>arrow_back</mat-icon> {{ 'common.back' | t }}</a>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label>{{ 'retosUsuario.usuario' | t }} *</label>
      <select [(ngModel)]="item.usuarioId" name="usuario" [disabled]="editando">
        <option [ngValue]="0" disabled>—</option>
        @for (u of usuarios; track u.idUsuario) {
          <option [ngValue]="u.idUsuario">{{ u.nombre }}</option>
        }
      </select>
    </div>
    <div class="form-group">
      <label>{{ 'retosUsuario.reto' | t }} *</label>
      <select [(ngModel)]="item.retoId" name="reto" [disabled]="editando">
        <option [ngValue]="0" disabled>—</option>
        @for (r of retos; track r.idReto) {
          <option [ngValue]="r.idReto">{{ r.titulo }}</option>
        }
      </select>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="completado" [(ngModel)]="item.completado" name="completado" />
      <label for="completado">{{ 'retosUsuario.completado' | t }}</label>
    </div>
    <button type="button" class="btn-guardar" (click)="guardar()">
      <mat-icon>save</mat-icon> {{ (editando ? 'common.saveChanges' : 'common.create') | t }}
    </button>
  </div>
</div>
