<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ editando ? 'Editar' : 'Nueva' }} Recompensa</h1>
      <p class="page-sub">{{ editando ? 'Modifica los datos de la recompensa' : 'Agrega un nuevo premio al catálogo' }}</p>
    </div>
    <a routerLink="/recompensas" class="btn-back"><mat-icon>arrow_back</mat-icon> Volver</a>
  </div>
  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre *</label>
        <input [(ngModel)]="recompensa.nombre" placeholder="Nombre de la recompensa" />
      </div>
      <div class="form-group">
        <label>Tipo *</label>
        <select [(ngModel)]="recompensa.tipo">
          @for (t of tipos; track t) { <option [value]="t">{{ t }}</option> }
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea [(ngModel)]="recompensa.descripcion" rows="3" placeholder="Describe la recompensa"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Costo en puntos</label>
        <input type="number" [(ngModel)]="recompensa.costoPuntos" min="0" />
      </div>
      <div class="form-group">
        <label>URL del recurso</label>
        <input [(ngModel)]="recompensa.recursoUrl" placeholder="https://..." />
      </div>
    </div>
    @if (error) {
      <p class="form-error"><mat-icon>error_outline</mat-icon> {{ error }}</p>
    }
    <button class="btn-guardar" (click)="guardar()" [disabled]="guardando">
      <mat-icon>save</mat-icon> {{ guardando ? 'Guardando...' : (editando ? 'Guardar cambios' : 'Crear Recompensa') }}
    </button>
  </div>
</div>
